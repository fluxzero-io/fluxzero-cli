name: Desktop App Build

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to build (e.g., 1.2.3)'
        required: false
        type: string
        default: 'dev'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.2.3)'
        required: false
        type: string
        default: 'dev'

jobs:
  desktop-build:
    name: Build Desktop App - ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: macos-amd64
            runner: macos-13
            task: :desktop:packageDmg
            artifact-name: desktop-macos-amd64
            artifact-path: desktop/build/compose/binaries/main/dmg/*.dmg
          - os: macos-arm64
            runner: macos-14
            task: :desktop:packageDmg
            artifact-name: desktop-macos-arm64
            artifact-path: desktop/build/compose/binaries/main/dmg/*.dmg
          - os: windows-amd64
            runner: windows-latest
            task: :desktop:packageMsi :desktop:packageExe
            artifact-name: desktop-windows-amd64
            artifact-path: |
              desktop/build/compose/binaries/main/msi/*.msi
              desktop/build/compose/binaries/main/exe/*.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup tools from .tool-versions
        uses: jdx/mise-action@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build desktop package
        shell: bash
        run: ./gradlew ${{ matrix.task }} -PappVersion=${{ inputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload desktop package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          retention-days: 30
