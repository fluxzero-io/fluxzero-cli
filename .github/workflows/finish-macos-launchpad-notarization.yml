name: Finish macOS Launchpad Notarization

on:
  repository_dispatch:
    types: [macos-launchpad-notarization-complete]
  workflow_dispatch:
    inputs:
      source_run_id:
        description: 'Workflow run id that produced the pending DMG artifact'
        required: true
        type: string
      submission_id:
        description: 'Optional Apple notarization submission id. If omitted, it is read from the source run metadata artifact.'
        required: false
        type: string
      version:
        description: 'Optional release tag to update after stapling, for example 1.3.13'
        required: false
        type: string

permissions:
  actions: read
  contents: write

jobs:
  finish-notarization:
    name: Staple accepted macOS Launchpad DMG
    runs-on: macos-14
    timeout-minutes: 15
    env:
      SOURCE_RUN_ID: ${{ github.event.client_payload.source_run_id || inputs.source_run_id }}
      INPUT_SUBMISSION_ID: ${{ github.event.client_payload.submission_id || inputs.submission_id }}
      INPUT_VERSION: ${{ github.event.client_payload.version || inputs.version }}

    steps:
      - name: Validate trigger context
        shell: bash
        run: |
          if [[ -z "$SOURCE_RUN_ID" ]]; then
            echo "::error::Missing source_run_id"
            exit 1
          fi

      - name: Download pending DMG artifact
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run download "$SOURCE_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name fluxzero-launchpad-macos-dmg-pending-notarization \
            --dir launchpad-artifacts

      - name: Download notarization submission metadata
        id: metadata
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for attempt in {1..12}; do
            if gh run download "$SOURCE_RUN_ID" \
              --repo "$GITHUB_REPOSITORY" \
              --name fluxzero-launchpad-notarization-submission \
              --dir notarization-metadata; then
              exit 0
            fi

            echo "Notarization metadata is not available yet; retrying in 10 seconds (${attempt}/12)."
            sleep 10
          done

          echo "::warning::Could not download notarization metadata artifact"
          exit 1

      - name: Resolve notarization context
        id: context
        shell: bash
        run: |
          submission_id="$INPUT_SUBMISSION_ID"
          version="$INPUT_VERSION"

          context_path=""
          if [[ -d notarization-metadata ]]; then
            while IFS= read -r candidate; do
              context_path="$candidate"
              break
            done < <(find notarization-metadata -type f -name 'notarization-context.env' -print)
          fi

          if [[ -n "$context_path" ]]; then
            while IFS='=' read -r key value; do
              case "$key" in
                submission_id)
                  if [[ -z "$submission_id" ]]; then
                    submission_id="$value"
                  fi
                  ;;
                version)
                  if [[ -z "$version" ]]; then
                    version="$value"
                  fi
                  ;;
              esac
            done < "$context_path"
          fi

          if [[ -z "$submission_id" ]]; then
            echo "::error::Missing submission_id and no metadata artifact provided one"
            exit 1
          fi

          echo "submission_id=$submission_id" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Locate DMG
        id: locate
        shell: bash
        run: |
          DMG_PATH=""
          while IFS= read -r candidate; do
            DMG_PATH="$candidate"
            break
          done < <(find launchpad-artifacts -type f -name 'Fluxzero-Launchpad.dmg' -print)
          if [[ -z "$DMG_PATH" ]]; then
            echo "::error::Could not find Fluxzero-Launchpad.dmg in downloaded artifact"
            find launchpad-artifacts -type f -print
            exit 1
          fi
          echo "dmg_path=$DMG_PATH" >> "$GITHUB_OUTPUT"

      - name: Check notarization status
        id: notary
        shell: bash
        env:
          SUBMISSION_ID: ${{ steps.context.outputs.submission_id }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
        run: |
          : "${APPLE_NOTARY_KEY_ID:?Missing APPLE_NOTARY_KEY_ID}"
          : "${APPLE_NOTARY_ISSUER_ID:?Missing APPLE_NOTARY_ISSUER_ID}"
          : "${APPLE_NOTARY_KEY_BASE64:?Missing APPLE_NOTARY_KEY_BASE64}"

          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TMP_DIR"' EXIT
          KEY_PATH="$TMP_DIR/AuthKey_$APPLE_NOTARY_KEY_ID.p8"
          printf '%s' "$APPLE_NOTARY_KEY_BASE64" | base64 -D > "$KEY_PATH"
          chmod 600 "$KEY_PATH"

          xcrun notarytool info "$SUBMISSION_ID" \
            --key "$KEY_PATH" \
            --key-id "$APPLE_NOTARY_KEY_ID" \
            --issuer "$APPLE_NOTARY_ISSUER_ID" \
            --output-format json | tee notarization-info.json

          STATUS="$(/usr/bin/plutil -extract status raw -o - notarization-info.json)"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

          case "$STATUS" in
            Accepted)
              echo "Notarization was accepted."
              ;;
            "In Progress")
              echo "::notice::Notarization is still in progress; rerun this workflow later."
              ;;
            Invalid|Rejected)
              xcrun notarytool log "$SUBMISSION_ID" \
                --key "$KEY_PATH" \
                --key-id "$APPLE_NOTARY_KEY_ID" \
                --issuer "$APPLE_NOTARY_ISSUER_ID" \
                --output-format json | tee notarization-log.json || true
              echo "::error::Notarization failed with status $STATUS"
              exit 1
              ;;
            *)
              echo "::error::Unexpected notarization status: $STATUS"
              exit 1
              ;;
          esac

      - name: Staple and verify DMG
        if: steps.notary.outputs.status == 'Accepted'
        shell: bash
        env:
          DMG_PATH: ${{ steps.locate.outputs.dmg_path }}
        run: |
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"
          spctl --assess --type open --context context:primary-signature --verbose=4 "$DMG_PATH"

      - name: Upload notarized DMG artifact
        if: steps.notary.outputs.status == 'Accepted'
        uses: actions/upload-artifact@v6
        with:
          name: fluxzero-launchpad-macos-dmg
          path: ${{ steps.locate.outputs.dmg_path }}
          retention-days: 30

      - name: Attach DMG to GitHub Release
        if: steps.notary.outputs.status == 'Accepted' && steps.context.outputs.version != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.context.outputs.version }}
          files: ${{ steps.locate.outputs.dmg_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload notarization status metadata
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: fluxzero-launchpad-notarization-status
          path: |
            notarization-info.json
            notarization-log.json
          if-no-files-found: warn
          retention-days: 30
