name: Deploy Notary Webhook

on:
  push:
    tags:
      - notary-webhook-v*
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: cloudflare/notary-webhook/package-lock.json

      - name: Install dependencies
        working-directory: cloudflare/notary-webhook
        run: npm ci

      - name: Run tests
        working-directory: cloudflare/notary-webhook
        run: npm test

      - name: Configure Worker secrets
        working-directory: cloudflare/notary-webhook
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NOTARY_WEBHOOK_TOKEN: ${{ secrets.NOTARY_WEBHOOK_TOKEN }}
          NOTARY_WEBHOOK_GITHUB_APP_ID: ${{ secrets.NOTARY_WEBHOOK_GITHUB_APP_ID }}
          NOTARY_WEBHOOK_GITHUB_APP_INSTALLATION_ID: ${{ secrets.NOTARY_WEBHOOK_GITHUB_APP_INSTALLATION_ID }}
          NOTARY_WEBHOOK_GITHUB_APP_PRIVATE_KEY_BASE64: ${{ secrets.NOTARY_WEBHOOK_GITHUB_APP_PRIVATE_KEY_BASE64 }}
        run: |
          : "${CLOUDFLARE_API_TOKEN:?Missing CLOUDFLARE_API_TOKEN}"
          : "${CLOUDFLARE_ACCOUNT_ID:?Missing CLOUDFLARE_ACCOUNT_ID}"
          : "${NOTARY_WEBHOOK_TOKEN:?Missing NOTARY_WEBHOOK_TOKEN}"
          : "${NOTARY_WEBHOOK_GITHUB_APP_ID:?Missing NOTARY_WEBHOOK_GITHUB_APP_ID}"
          : "${NOTARY_WEBHOOK_GITHUB_APP_INSTALLATION_ID:?Missing NOTARY_WEBHOOK_GITHUB_APP_INSTALLATION_ID}"
          : "${NOTARY_WEBHOOK_GITHUB_APP_PRIVATE_KEY_BASE64:?Missing NOTARY_WEBHOOK_GITHUB_APP_PRIVATE_KEY_BASE64}"

          printf '%s' "$NOTARY_WEBHOOK_TOKEN" | npx wrangler secret put WEBHOOK_TOKEN
          printf '%s' "$NOTARY_WEBHOOK_GITHUB_APP_ID" | npx wrangler secret put GITHUB_APP_ID
          printf '%s' "$NOTARY_WEBHOOK_GITHUB_APP_INSTALLATION_ID" | npx wrangler secret put GITHUB_APP_INSTALLATION_ID
          printf '%s' "$NOTARY_WEBHOOK_GITHUB_APP_PRIVATE_KEY_BASE64" | npx wrangler secret put GITHUB_APP_PRIVATE_KEY_BASE64

      - name: Deploy Worker
        working-directory: cloudflare/notary-webhook
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy
